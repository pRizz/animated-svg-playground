<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
<title id="title">CSS keyframes movement</title>
<desc id="desc">Inline style block animating horizontal movement with keyframes.</desc>
<style>

        .runner {
          animation: slide-runner 2.4s ease-in-out infinite alternate;
          transform-box: fill-box;
          transform-origin: center;
        }

        @keyframes slide-runner {
          from {
            transform: translateX(0px);
          }

          to {
            transform: translateX(164px);
          }
        }
      
</style>
<rect width="320" height="180" rx="18" fill="#020617"/>
<rect x="8" y="8" width="304" height="164" rx="16" fill="#0f172a" stroke="#1e293b"/>
<text x="16" y="24" fill="#f8fafc" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif">CSS keyframes movement</text>
<text x="16" y="38" fill="#94a3b8" font-size="11" font-family="Inter, Arial, sans-serif">Inline style block animating horizontal movement with keyframes.</text>
<text x="16" y="60" fill="#94a3b8" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">CANVAS</text>
<text x="82" y="60" fill="#e2e8f0" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">320×180</text>
<rect x="16" y="48" width="288" height="116" rx="14" fill="#111827" stroke="#334155"/>
<g opacity="0.24">
<path d="M16 106 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M16 76 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M96 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M176 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M256 48 V164" stroke="#1e293b" stroke-width="1"/>
</g>
<text x="30" y="154" fill="#94a3b8" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">embedded &lt;style&gt; and class selectors</text>

        <line x1="40" y1="116" x2="280" y2="116" stroke="#334155" stroke-width="6" stroke-linecap="round" />
        <circle class="runner" cx="76" cy="116" r="18" fill="#38bdf8" />
        <text x="142" y="100" fill="#e2e8f0" font-size="15">CSS keyframes</text>
        <text x="142" y="120" fill="#94a3b8" font-size="11">translateX via embedded style block</text>
      

</svg>