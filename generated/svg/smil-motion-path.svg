<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
<title id="title">SMIL animateMotion path follow</title>
<desc id="desc">Moves a dot along a visible guide path.</desc>

<rect width="320" height="180" rx="18" fill="#020617"/>
<rect x="8" y="8" width="304" height="164" rx="16" fill="#0f172a" stroke="#1e293b"/>
<text x="16" y="24" fill="#f8fafc" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif">SMIL animateMotion path follow</text>
<text x="16" y="38" fill="#94a3b8" font-size="11" font-family="Inter, Arial, sans-serif">Moves a dot along a visible guide path.</text>
<text x="16" y="60" fill="#94a3b8" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">CANVAS</text>
<text x="82" y="60" fill="#e2e8f0" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">320×180</text>
<rect x="16" y="48" width="288" height="116" rx="14" fill="#111827" stroke="#334155"/>
<g opacity="0.24">
<path d="M16 106 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M16 76 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M96 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M176 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M256 48 V164" stroke="#1e293b" stroke-width="1"/>
</g>
<text x="30" y="154" fill="#94a3b8" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">animateMotion along path</text>
<path id="motion-track" d="M 40 124 C 96 50, 224 50, 280 124" fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round" />
<circle cx="0" cy="0" r="14" fill="#f43f5e">
  <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
    <mpath href="#motion-track" />
  </animateMotion>
</circle>

</svg>