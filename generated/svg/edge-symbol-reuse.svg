<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
<title id="title">Symbol and use reuse</title>
<desc id="desc">Reuses one symbol instance at multiple sizes to test defs-based reuse.</desc>
<defs>

        <symbol id="tile-star" viewBox="0 0 48 48">
          <path
            d="M24 6 L29 19 L43 19 L32 28 L36 42 L24 33 L12 42 L16 28 L5 19 L19 19 Z"
            fill="#f59e0b"
            stroke="#fef3c7"
            stroke-width="2"
          />
        </symbol>
      
</defs>
<rect width="320" height="180" rx="18" fill="#020617"/>
<rect x="8" y="8" width="304" height="164" rx="16" fill="#0f172a" stroke="#1e293b"/>
<text x="16" y="24" fill="#f8fafc" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif">Symbol and use reuse</text>
<text x="16" y="38" fill="#94a3b8" font-size="11" font-family="Inter, Arial, sans-serif">Reuses one symbol instance at multiple sizes to test defs-based reuse.</text>
<text x="16" y="60" fill="#94a3b8" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">CANVAS</text>
<text x="82" y="60" fill="#e2e8f0" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">320×180</text>
<rect x="16" y="48" width="288" height="116" rx="14" fill="#111827" stroke="#334155"/>
<g opacity="0.24">
<path d="M16 106 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M16 76 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M96 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M176 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M256 48 V164" stroke="#1e293b" stroke-width="1"/>
</g>

        <use href="#tile-star" x="50" y="70" width="48" height="48" />
        <use href="#tile-star" x="136" y="58" width="68" height="68" opacity="0.92" />
        <use href="#tile-star" x="232" y="74" width="40" height="40" opacity="0.8" />
        <text x="50" y="144" fill="#cbd5e1" font-size="12">Single symbol definition, three instances</text>
      

</svg>