<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
<title id="title">Looping line draw</title>
<desc id="desc">A looping rectangular route continuously redraws itself.</desc>

<rect width="320" height="180" rx="18" fill="#020617"/>
<rect x="8" y="8" width="304" height="164" rx="16" fill="#0f172a" stroke="#1e293b"/>
<text x="16" y="24" fill="#f8fafc" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif">Looping line draw</text>
<text x="16" y="38" fill="#94a3b8" font-size="11" font-family="Inter, Arial, sans-serif">A looping rectangular route continuously redraws itself.</text>
<text x="16" y="60" fill="#94a3b8" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">CANVAS</text>
<text x="82" y="60" fill="#e2e8f0" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">320×180</text>
<rect x="16" y="48" width="288" height="116" rx="14" fill="#111827" stroke="#334155"/>
<g opacity="0.24">
<path d="M16 106 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M16 76 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M96 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M176 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M256 48 V164" stroke="#1e293b" stroke-width="1"/>
</g>
<path
          d="M70 70 H250 Q266 70 266 86 V114 Q266 130 250 130 H70 Q54 130 54 114 V86 Q54 70 70 70 Z"
          fill="none"
          stroke="#f59e0b"
          stroke-width="6"
          stroke-linecap="round"
          stroke-dasharray="420"
          stroke-dashoffset="420"
        >
          <animate attributeName="stroke-dashoffset" from="420" to="0" dur="2.4s" repeatCount="indefinite" />
        </path>
<text x="160" y="106" text-anchor="middle" fill="#f8fafc" font-size="13">looping draw</text>

</svg>