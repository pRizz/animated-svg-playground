<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
<title id="title">SMIL transform rotate, scale, translate</title>
<desc id="desc">Runs three animateTransform variants side-by-side.</desc>

<rect width="320" height="180" rx="18" fill="#020617"/>
<rect x="8" y="8" width="304" height="164" rx="16" fill="#0f172a" stroke="#1e293b"/>
<text x="16" y="24" fill="#f8fafc" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif">SMIL transform rotate, scale, translate</text>
<text x="16" y="38" fill="#94a3b8" font-size="11" font-family="Inter, Arial, sans-serif">Runs three animateTransform variants side-by-side.</text>
<text x="16" y="60" fill="#94a3b8" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">CANVAS</text>
<text x="82" y="60" fill="#e2e8f0" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">320×180</text>
<rect x="16" y="48" width="288" height="116" rx="14" fill="#111827" stroke="#334155"/>
<g opacity="0.24">
<path d="M16 106 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M16 76 H304" stroke="#1e293b" stroke-width="1"/>
<path d="M96 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M176 48 V164" stroke="#1e293b" stroke-width="1"/>
<path d="M256 48 V164" stroke="#1e293b" stroke-width="1"/>
</g>
<text x="30" y="154" fill="#94a3b8" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rotate / scale / translate</text>
<g transform="translate(72 102)">
  <rect x="-14" y="-14" width="28" height="28" rx="6" fill="#38bdf8">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3.5s" repeatCount="indefinite" />
  </rect>
</g>
<g transform="translate(160 102)">
  <circle cx="0" cy="0" r="18" fill="#22c55e">
    <animateTransform attributeName="transform" type="scale" values="1;1.45;1" dur="2s" repeatCount="indefinite" additive="sum" />
  </circle>
</g>
<g transform="translate(240 102)">
  <rect x="-18" y="-12" width="36" height="24" rx="6" fill="#f97316">
    <animateTransform attributeName="transform" type="translate" values="0 0;-18 0;0 0;18 0;0 0" dur="2.4s" repeatCount="indefinite" additive="sum" />
  </rect>
</g>

</svg>